services:
  - type: web
    name: phishguard
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: gunicorn app:app -c gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 2
      - key: ENV
        value: production
      - key: RENDER
        value: "true"
      - key: MONGO_URI
        sync: false
